name: CodeQL

# GitHub-hosted security analysis for the C++ source. Free for public
# repos, results land in the Security tab of the repo. Manual build
# mode because CodeQL needs to actually compile the C++ to extract
# the AST — same apt deps as build.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 07:00 UTC. CodeQL queries get refined over time;
    # the schedule catches new findings on a static codebase.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (C++)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Apt build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-multimedia-dev \
            qt6-websockets-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-nice \
            gstreamer1.0-libav \
            libnice-dev \
            libx11-dev \
            libxfixes-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          # security-extended adds higher-precision queries beyond the
          # default set; cost is a few extra minutes per run.
          queries: security-extended
          build-mode: manual

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp
