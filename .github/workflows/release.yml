name: Release

on:
  push:
    tags:
      - 'v*'

# Need write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Apt build deps
        # System Qt 6.4 from noble — keeps the .deb's runtime deps as
        # stock apt packages. See CMakeLists comment on find_package.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-multimedia-dev \
            qt6-websockets-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-nice \
            gstreamer1.0-libav \
            libnice-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Determine version
        id: version
        run: |
          # Strip the leading 'v' from the tag — semver and Debian both
          # want `1.2.3`, not `v1.2.3`.
          ver="${GITHUB_REF_NAME#v}"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${ver}"

      - name: Install nfpm
        run: |
          curl -sSL -o /tmp/nfpm.tar.gz \
            https://github.com/goreleaser/nfpm/releases/download/v2.46.3/nfpm_2.46.3_Linux_x86_64.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Package .deb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p out
          nfpm package \
            --packager deb \
            --config dist/nfpm.yaml \
            --target "out/glasshouse-viewer_${VERSION}_amd64.deb"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            "out/glasshouse-viewer_${VERSION}_amd64.deb"
