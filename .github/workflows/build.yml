name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight build for the same branch when a new commit lands —
# saves Actions minutes on rapid pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full history so `git describe` can derive a useful
          # version on branch builds.
          fetch-depth: 0

      - name: Apt build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            cmake \
            pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-nice \
            gstreamer1.0-libav \
            libnice-dev

      - name: Install Qt 6.7
        # Ubuntu 24.04 noble ships Qt 6.4; we need ≥ 6.7 for QWebSocket
        # subprotocol options and a few QVideoSink behaviors. aqt-installed
        # Qt sits in the runner-only path; the produced binary needs the
        # same Qt 6.7 to be present at install time on the target machine
        # (see dist/nfpm.yaml).
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtmultimedia qtwebsockets'
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Determine version
        id: version
        run: |
          if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            ver="$(git describe --tags HEAD | sed 's/^v//')"
          else
            ver="0.0.0+sha.$(git rev-parse --short HEAD)"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Building package version ${ver}"

      - name: Install nfpm
        run: |
          curl -sSL -o /tmp/nfpm.tar.gz \
            https://github.com/goreleaser/nfpm/releases/download/v2.46.3/nfpm_2.46.3_Linux_x86_64.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Package .deb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p out
          nfpm package \
            --packager deb \
            --config dist/nfpm.yaml \
            --target "out/glasshouse-viewer_${VERSION}_amd64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glasshouse-viewer-deb
          path: out/*.deb
          if-no-files-found: error
