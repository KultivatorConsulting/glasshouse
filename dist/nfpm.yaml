# nfpm config for the glasshouse-viewer Debian package.
#
# Built by .github/workflows/{build,release}.yml after `cmake --build`. The
# version is supplied via the VERSION environment variable (nfpm expands
# ${VERSION} natively); GitHub Actions sets it from the git tag for releases
# and from `0.0.0+sha.<short>` for branch builds.
#
# Note: Qt6 is intentionally not in `depends`. The current target environment
# uses an aqt-installed Qt 6.7 toolchain, which Ubuntu 24.04's apt does not
# expose at that version. Once we decide between bundling Qt with the
# package or shipping for system Qt 6.4 (lowering the CMakeLists pin),
# update `depends` accordingly.

name: glasshouse-viewer
arch: amd64
platform: linux
version: ${VERSION}
version_schema: semver
section: net
priority: optional

maintainer: "Raoul Mackle <raoul.mackle@kultivator.co.nz>"
vendor: "Kultivator Consulting"
homepage: "https://github.com/kultivator-consulting/glasshouse"
license: LGPL-3.0
description: |
  Multi-screen PiKVM desktop client.

  A native Linux application for KDE Plasma that presents one window per
  PiKVM, decoding H.264 (via Janus/WebRTC) or MJPEG video and routing a
  single keyboard and mouse session through a chosen HID master.

depends:
  # GStreamer runtime — both transports lean on the gst plugin set.
  - libgstreamer1.0-0
  - gstreamer1.0-plugins-good       # souphttpsrc, multipartdemux, jpegdec
  - gstreamer1.0-plugins-bad        # webrtcbin, h264parse, vah264dec
  - gstreamer1.0-nice               # nicesrc/nicesink — webrtcbin's ICE
  - gstreamer1.0-libav              # avdec_h264 software fallback
  - libnice10

contents:
  - src: ./build/bin/glasshouse-viewer
    dst: /usr/bin/glasshouse-viewer
    file_info:
      mode: 0755

  - src: ./build/bin/glasshouse-cli
    dst: /usr/bin/glasshouse-cli
    file_info:
      mode: 0755

  - src: ./dist/glasshouse-viewer.desktop
    dst: /usr/share/applications/glasshouse-viewer.desktop
    file_info:
      mode: 0644

  # Debian convention: copyright file under /usr/share/doc/<pkg>/copyright.
  - src: ./LICENSES/LGPL-3.0.txt
    dst: /usr/share/doc/glasshouse-viewer/copyright
    file_info:
      mode: 0644

  - src: ./README.md
    dst: /usr/share/doc/glasshouse-viewer/README.md
    file_info:
      mode: 0644

  - src: ./dist/glasshouse-viewer.example.yaml
    dst: /etc/xdg/glasshouse/glasshouse-viewer.example.yaml
    type: config
    file_info:
      mode: 0644
